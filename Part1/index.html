<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore Inventory - Part1</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>📦 TechStore Inventory System</h1>
        <div id="messageArea"></div>
        <div class="form-panel">
            <h2>Add / Edit Item</h2>
            <input type="text" id="itemName" placeholder="Item Name">
            <select id="category">
                <option>Electronics</option><option>Furniture</option><option>Clothing</option>
                <option>Tools</option><option>Miscellaneous</option>
            </select>
            <input type="number" id="quantity" placeholder="Quantity">
            <input type="number" id="price" placeholder="Price">
            <input type="text" id="supplier" placeholder="Supplier">
            <select id="stockStatus">
                <option>In Stock</option><option>Low Stock</option><option>Out of Stock</option>
            </select>
            <select id="popular">
                <option>Yes</option><option>No</option>
            </select>
            <input type="text" id="comment" placeholder="Comment">
            <button id="submitBtn">Add Item</button>
            <button id="updateBtn">Update (by Name)</button>
            <button id="deleteBtn">Delete (by Name)</button>
            <button id="clearBtn">Clear Form</button>
        </div>
        <div>
            <input type="text" id="searchInput" placeholder="Search by name">
            <button id="searchBtn">Search</button>
            <button id="resetSearchBtn">Reset</button>
            <button id="showAllBtn">Show All</button>
            <button id="showPopularBtn">Show Popular</button>
        </div>
        <div id="inventoryTable"></div>
    </div>

    <!-- 自定义模态框 -->
    <div id="customConfirm" class="modal">
        <div class="modal-content">
            <p id="confirmMessage">Are you sure?</p>
            <button id="confirmYes">Yes</button>
            <button id="confirmNo">No</button>
        </div>
    </div>

    <script src="dist/inventory.js"></script>
</body>
</html>
